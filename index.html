<script src="data.js"></script>

<h2 class="section-title">Tendances</h2>

<div class="recipe-grid" id="grid-affichage"></div>

<script>
    const searchInput = document.getElementById('search-input');
    const grid = document.getElementById('grid-affichage');
    const suggestionsBox = document.getElementById('suggestions-box');

    // Fonction d'affichage avec filtre intelligent global (Titre + Ingrédients + Nation)
    function afficherRecettes(filtre = "") {
        grid.innerHTML = ""; 
        const motCle = filtre.toLowerCase().trim();
        
        const idsFiltrés = Object.keys(recettes).filter(id => {
            const r = recettes[id];
            
            // Critère A : Recherche dans le titre
            const titreMatch = r.title.toLowerCase().includes(motCle);
            
            // Critère B : Recherche dans le pays (nation)
            const nationMatch = r.nation ? r.nation.toLowerCase().includes(motCle) : false;
            
            // Critère C : Recherche dans les ingrédients (gère le texte ET les objets avec quantités)
            const ingredientsMatch = r.ingredients && r.ingredients.some(ing => {
                const nomIngredient = typeof ing === 'object' ? ing.nom : ing;
                return nomIngredient.toLowerCase().includes(motCle);
            });

            return titreMatch || nationMatch || ingredientsMatch;
        });

        if (idsFiltrés.length === 0) {
            grid.innerHTML = "<p style='color:var(--text-dark); grid-column: 1/-1; text-align:center;'>Aucun plat trouvé... 🍳</p>";
            return;
        }

        // Affichage des cartes filtrées
        idsFiltrés.forEach(id => {
            const r = recettes[id];
            grid.innerHTML += `
                <a href="recette.html?id=${id}" class="recipe-card-link">
                    <div class="recipe-card">
                        <img src="${r.image}" class="recipe-main-image">
                        <div class="recipe-info">
                            <h3>${r.title}</h3>
                            <p>⭐ ${r.rating || '4.5'} | ⏱️ ${r.time}</p>
                        </div>
                    </div>
                </a>
            `;
        });
    }

    // Écouteur de la recherche intelligent
    searchInput.addEventListener('input', (e) => {
        const motCle = e.target.value.toLowerCase().trim();
        suggestionsBox.innerHTML = ""; 

        if (motCle.length > 0) {
            // Recherche des suggestions correspondantes (Titres ou Nations)
            const suggestions = Object.keys(recettes).filter(id => {
                const r = recettes[id];
                const titreMatch = r.title.toLowerCase().includes(motCle);
                const nationMatch = r.nation ? r.nation.toLowerCase().includes(motCle) : false;
                return titreMatch || nationMatch;
            });

            if (suggestions.length > 0) {
                suggestionsBox.style.display = "block"; 
                const listeAffichee = new Set(); // Évite les doublons de pays suggérés

                suggestions.forEach(id => {
                    const r = recettes[id];
                    
                    // Si le mot-clé correspond à un pays, on suggère le pays
                    if (r.nation && r.nation.toLowerCase().includes(motCle) && !listeAffichee.has(r.nation)) {
                        listeAffichee.add(r.nation);
                        creerItemSuggestion(r.nation, `🌍 Pays : ${r.nation}`);
                    } 
                    // Sinon, on suggère le titre de la recette
                    else if (r.title.toLowerCase().includes(motCle) && !listeAffichee.has(r.title)) {
                        listeAffichee.add(r.title);
                        creerItemSuggestion(r.title, r.title);
                    }
                });
            } else {
                suggestionsBox.style.display = "none";
            }
        } else {
            suggestionsBox.style.display = "none";
        }
        
        // Filtrage de la grille principale en temps réel
        afficherRecettes(motCle);
    });

    // Fonction outil pour créer et gérer le clic sur un élément de suggestion
    function creerItemSuggestion(valeurRecherche, texteAffiche) {
        const div = document.createElement('div');
        div.classList.add('suggestion-item');
        div.innerText = texteAffiche;
        
        div.onclick = () => {
            searchInput.value = valeurRecherche; // Remplit le champ
            suggestionsBox.style.display = "none"; // Masque les suggestions
            afficherRecettes(valeurRecherche); // Lance l'affichage filtré
        };
        suggestionsBox.appendChild(div);
    }

    // Cacher les suggestions si on clique ailleurs
    document.addEventListener('click', (e) => {
        if (e.target !== searchInput) {
            suggestionsBox.style.display = "none";
        }
    });

    // Affichage initial au chargement de la page
    if (typeof recettes !== 'undefined') {
        afficherRecettes();
    } else {
        grid.innerHTML = "<p style='color:red'>Erreur : data.js non trouvé.</p>";
    }

    // Gestion du menu Burger mobile
    const menuToggle = document.getElementById('mobile-menu');
    const navMenu = document.querySelector('.nav-mobile');

    if (menuToggle && navMenu) {
        menuToggle.onclick = function() {
            navMenu.classList.toggle('active');
            menuToggle.classList.toggle('is-active');
        };

        document.querySelectorAll('.nav-mobile a').forEach(link => {
            link.onclick = () => {
                navMenu.classList.remove('active');
                menuToggle.classList.remove('is-active');
            };
        });
    }
</script>
