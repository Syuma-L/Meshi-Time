<main class="recipe-container">
    <section class="recipe-header">
        <h1 id="titre-recette"></h1>
        <div class="main-image-wrapper">
            <img id="image-recette" src="" alt="" class="recipe-hero-img">
        </div>
    </section>

    <div class="recipe-content">
        <aside class="ingredients-sidebar">
            <h3><i class="fas fa-shopping-basket"></i> Ingrédients</h3>
                
            <div class="quantite-selecteur">
                <span>Pour </span>
                <button type="button" id="btn-moins">-</button>
                <span id="nb-personnes">2</span>
                <span> personnes</span>
                <button type="button" id="btn-plus">+</button>               
             </div>

             <ul id="liste-ingredients"></ul>
        </aside>

        <section class="instructions-main">
            <h3><i class="fas fa-utensils"></i> Préparation</h3>
            <div id="liste-etapes"></div> 
        </section>
    </div>
</main>

<div id="overlay-image" class="overlay" onclick="fermerImage()">
    <span class="close-btn">&times;</span>
    <img id="full-res-img" src="" alt="Zoom recette">
</div>

<section class="suggestions-bas">
    <h2 class="section-title">Découvrez d'autres recettes</h2>
    <div class="recipe-grid" id="grid-suggestions">
        </div>
</section>

<script src="data.js"></script>
<script>
// --- 1. GESTION DU MENU BURGER ---
document.addEventListener('DOMContentLoaded', () => {
    const menuToggle = document.getElementById('mobile-menu');
    const navMenu = document.querySelector('.nav-mobile');

    if (menuToggle && navMenu) {
        menuToggle.onclick = function() {
            navMenu.classList.toggle('active');
        };

        document.querySelectorAll('.nav-mobile a').forEach(link => {
            link.onclick = () => navMenu.classList.remove('active');
        });
    }
});

// --- 2. LOGIQUE DE LA PAGE RECETTE ---
const urlParams = new URLSearchParams(window.location.search);
const recipeId = urlParams.get('id');

// Sécurité au cas où la clé n'existe pas du tout dans data.js
const laRecette = (typeof recettes !== 'undefined' && recettes) ? recettes[recipeId] : null;

// On définit une valeur par défaut si basePersonnes n'est pas écrit
let quantiteActuelle = laRecette ? (laRecette.basePersonnes || 2) : 2;

function afficherIngredients(nbPersonnes) {
    const liste = document.getElementById('liste-ingredients');
    if (!liste || !laRecette || !laRecette.ingredients) return;
    liste.innerHTML = ""; 

    laRecette.ingredients.forEach(ing => {
        let li = document.createElement('li');
        
        // Vérifie si l'ingrédient est bien un objet et possède une quantité
        if (ing && typeof ing === 'object' && ing.quantite !== undefined) {
            if (ing.quantite > 0) {
                let base = laRecette.basePersonnes || 2;
                let calculQuantite = (ing.quantite / base) * nbPersonnes;
                let quantiteArrondie = Math.round(calculQuantite * 10) / 10; 
                let espaceUnite = ing.unite ? " " : "";
                
                li.innerHTML = `${ing.nom} : <strong>${quantiteArrondie}${espaceUnite}${ing.unite}</strong>`;
            } else {
                li.innerHTML = `${ing.nom}`;
            }
        } else {
            // Si c'est l'ancien format texte (ex: "poulet")
            li.innerHTML = `${ing}`;
        }
        liste.appendChild(li);
    });
}

if (laRecette) {
    if (document.getElementById('titre-recette')) document.getElementById('titre-recette').innerText = laRecette.title || "Recette";
    if (document.getElementById('image-recette')) document.getElementById('image-recette').src = laRecette.image || "";
    if (document.getElementById('nb-personnes')) document.getElementById('nb-personnes').innerText = quantiteActuelle;
    
    afficherIngredients(quantiteActuelle);

    // Événement Bouton Moins
    const btnMoins = document.getElementById('btn-moins');
    if (btnMoins) {
        btnMoins.onclick = () => {
            if (quantiteActuelle > 1) {
                quantiteActuelle--;
                if (document.getElementById('nb-personnes')) document.getElementById('nb-personnes').innerText = quantiteActuelle;
                afficherIngredients(quantiteActuelle);
            }
        };
    }

    // Événement Bouton Plus
    const btnPlus = document.getElementById('btn-plus');
    if (btnPlus) {
        btnPlus.onclick = () => {
            quantiteActuelle++;
            if (document.getElementById('nb-personnes')) document.getElementById('nb-personnes').innerText = quantiteActuelle;
            afficherIngredients(quantiteActuelle);
        };
    }

    // Affichage des étapes
    const listeEtapes = document.getElementById('liste-etapes');
    if (listeEtapes && laRecette.etapes) {
        laRecette.etapes.forEach((etape, index) => {
            let div = document.createElement('div');
            div.classList.add('step-item');
            
            let texteEtape = typeof etape === 'object' ? etape.texte : etape;
            let photoEtape = typeof etape === 'object' ? etape.photo : null;
            
            const imageHTML = photoEtape 
                ? `<img src="${photoEtape}" class="step-img" onclick="agrandirImage('${photoEtape}')">` 
                : '';

            div.innerHTML = `
                <div class="step-text-container">
                    <p><span class="step-number">Étape ${index + 1}</span> ${texteEtape}</p>
                </div>
                ${imageHTML}
            `;
            listeEtapes.appendChild(div);
        });
    }
} else {
    if (document.getElementById('titre-recette')) {
        document.getElementById('titre-recette').innerText = "Recette non trouvée !";
    }
}

// --- 3. FONCTIONS GLOBALES (Overlay & Suggestions) ---
function agrandirImage(src) {
    const overlay = document.getElementById('overlay-image');
    const fullImg = document.getElementById('full-res-img');
    if (overlay && fullImg) {
        fullImg.src = src;
        overlay.style.display = 'flex';
    }
}

function fermerImage() {
    const overlay = document.getElementById('overlay-image');
    if (overlay) overlay.style.display = 'none';
}

function chargerSuggestions() {
    const gridSuggestions = document.getElementById('grid-suggestions');
    if (!gridSuggestions || typeof recettes === 'undefined') return;
    gridSuggestions.innerHTML = ""; 

    const toutesLesCles = Object.keys(recettes);
    const idActuel = new URLSearchParams(window.location.search).get('id');
    
    const autresRecettes = toutesLesCles.filter(id => id !== idActuel);
    const selection = autresRecettes.sort(() => 0.5 - Math.random()).slice(0, 6);

    selection.forEach(id => {
        const r = recettes[id];
        gridSuggestions.innerHTML += `
            <a href="recette.html?id=${id}" class="recipe-card-link">
                <div class="recipe-card">
                    <img src="${r.image}" class="recipe-main-image">
                    <div class="recipe-info">
                        <h3>${r.title}</h3>
                        <p>⭐ ${r.rating || '4.5'} | ⏱️ ${r.time}</p>
                    </div>
                </div>
            </a>
        `;
    });
}

chargerSuggestions();
</script>
