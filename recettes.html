<main id="contenu-principal">

<script src="data.js"></script>
<script>
const contenuPrincipal = document.getElementById('contenu-principal');
const searchInput = document.getElementById('search-input');
const suggestionsBox = document.getElementById('suggestions-box');

// 1. FONCTION DE RECHERCHE INTELLIGENTE ET MULTI-CRITÈRES
function ordonnerEtAfficherRecettes(filtre = "") {
    contenuPrincipal.innerHTML = ""; // On vide la page
    const motCle = filtre.toLowerCase().trim();

    // On prépare l'objet qui va regrouper les recettes par pays
    const recettesParNation = {};

    Object.keys(recettes).forEach(id => {
        const r = recettes[id];
        
        // CRITÈRE A : Recherche dans le Titre de la recette
        const titreMatch = r.title.toLowerCase().includes(motCle);
        
        // CRITÈRE B : Recherche dans le Pays (Nation)
        const nationMatch = r.nation ? r.nation.toLowerCase().includes(motCle) : false;
        
        // CRITÈRE C : Recherche dans la liste des Ingrédients
        const ingredientsMatch = r.ingredients && r.ingredients.some(ing => {
            // S'il s'agit d'un objet {nom, quantite, unite}, on prend ing.nom, sinon le texte direct
            const nomIngredient = typeof ing === 'object' ? ing.nom : ing;
            return nomIngredient.toLowerCase().includes(motCle);
        });

        // Validation de la recherche intelligente : si l'un des 3 critères matche, on garde la recette !
        if (titreMatch || nationMatch || ingredientsMatch) {
            const pays = r.nation || "Autres"; 
            
            if (!recettesParNation[pays]) {
                recettesParNation[pays] = [];
            }
            recettesParNation[pays].push({ id, ...r });
        }
    });

    // Si aucun résultat ne correspond à la recherche
    if (Object.keys(recettesParNation).length === 0) {
        contenuPrincipal.innerHTML = "<p style='color:white; text-align:center; padding: 40px;'>Aucun plat, pays ou ingrédient ne correspond à votre recherche... 🍳</p>";
        return;
    }

    // Affichage des sections par Nationalité
    Object.keys(recettesParNation).forEach(pays => {
        const listeRecettesDuPays = recettesParNation[pays];

        // Titre de la section Pays
        const sectionTitle = document.createElement('h2');
        sectionTitle.classList.add('section-title');
        sectionTitle.style.marginTop = "40px";
        sectionTitle.innerText = `${pays}`;
        contenuPrincipal.appendChild(sectionTitle);

        // Grille de cartes pour ce pays
        const grid = document.createElement('div');
        grid.classList.add('recipe-grid');

        listeRecettesDuPays.forEach(r => {
            grid.innerHTML += `
                <a href="recette.html?id=${r.id}" class="recipe-card-link">
                    <div class="recipe-card">
                        <img src="${r.image}" class="recipe-main-image">
                        <div class="recipe-info">
                            <h3>${r.title}</h3>
                            <p>⭐ ${r.rating || '4.5'} | ⏱️ ${r.time}</p>
                        </div>
                    </div>
                </a>
            `;
        });

        contenuPrincipal.appendChild(grid);
    });
}

// 2. GESTION DE LA BARRE DE RECHERCHE & SUGGESTIONS AUTOMATIQUES
searchInput.addEventListener('input', (e) => {
    const motCle = e.target.value.toLowerCase().trim();
    suggestionsBox.innerHTML = ""; 

    if (motCle.length > 0) {
        // Les suggestions automatiques proposent des Titres de recettes ET des Pays !
        const suggestions = Object.keys(recettes).filter(id => {
            const r = recettes[id];
            const titreMatch = r.title.toLowerCase().includes(motCle);
            const nationMatch = r.nation ? r.nation.toLowerCase().includes(motCle) : false;
            return titreMatch || nationMatch;
        });

        if (suggestions.length > 0) {
            suggestionsBox.style.display = "block";
            
            // Pour éviter les doublons de pays dans la liste déroulante, on utilise un Set
            const listeAffichee = new Set();

            suggestions.forEach(id => {
                const r = recettes[id];
                
                // Si le mot-clé correspond au pays, on suggère le pays
                if (r.nation && r.nation.toLowerCase().includes(motCle) && !listeAffichee.has(r.nation)) {
                    listeAffichee.add(r.nation);
                    creerItemSuggestion(r.nation, `🌍 Pays : ${r.nation}`);
                } 
                // Sinon on suggère le titre de la recette
                else if (r.title.toLowerCase().includes(motCle) && !listeAffichee.has(r.title)) {
                    listeAffichee.add(r.title);
                    creerItemSuggestion(r.title, r.title);
                }
            });
        } else {
            suggestionsBox.style.display = "none";
        }
    } else {
        suggestionsBox.style.display = "none";
    }
    
    // Filtrage de la grille globale en temps réel
    ordonnerEtAfficherRecettes(motCle);
});

// Fonction outil pour injecter un élément dans la liste des suggestions
function creerItemSuggestion(valeurRecherche, texteAffiche) {
    const div = document.createElement('div');
    div.classList.add('suggestion-item');
    div.innerText = texteAffiche;
    
    div.onclick = () => {
        searchInput.value = valeurRecherche; // Remplit le champ
        suggestionsBox.style.display = "none"; // Ferme le menu de suggestion
        ordonnerEtAfficherRecettes(valeurRecherche); // Filtre
    };
    suggestionsBox.appendChild(div);
}

// Cacher les suggestions si on clique en dehors de la barre de recherche
document.addEventListener('click', (e) => {
    if (e.target !== searchInput) {
        suggestionsBox.style.display = "none";
    }
});

// Affichage initial au chargement complet
ordonnerEtAfficherRecettes();

// Gestion du menu Burger mobile
const menuToggle = document.getElementById('mobile-menu');
const navMenu = document.querySelector('.nav-mobile');

if (menuToggle && navMenu) {
    menuToggle.onclick = function() {
        navMenu.classList.toggle('active');
        menuToggle.classList.toggle('is-active');
    };

    document.querySelectorAll('.nav-mobile a').forEach(link => {
        link.onclick = () => {
            navMenu.classList.remove('active');
            menuToggle.classList.remove('is-active');
        };
    });
}
</script>
